<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Online</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>

<header>
    <div class="logo">Sweet Dreams</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="order.html" class="cta-nav">Order Now</a>
    </nav>
</header>

<section class="form-section">
    <h1>Place Your Order</h1>

    <form id="orderForm">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>


        <label for="email">Email Address</label>
        <input type="email" id="email" required>

        <label for="tel">Telephone Number</label>
        <input type="tel" id="tel" required>

        <label for="dessert">Select Dessert</label>
        <select id="dessert" required>
            <option value="">Choose One</option>
            <option>Matcha Cloud Tiramisu</option>
            <option>Strawberry Cloud Cake</option>
            <option>Biscoff Cookie Crunch</option>
            <option>Ube Purple Dream</option>
            <option>Pistachio Dream Tart</option>
            <option>Cronut Supreme</option>
        </select>

        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" min="1" required>

        <button type="submit" class="button">Submit Order</button>
    </form>

    <p id="formMessage"></p>
</section>

<footer>
    <p>© 2026 Sweet Dreams Bakery</p>
</footer>

</body>
</html>
