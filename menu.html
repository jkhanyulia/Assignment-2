<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <script src="https://kit.fontawesome.com/7834487d10.js" crossorigin="anonymous"></script>
</head>
<body>

<header class="primary-header flex">
    <div class="logo">Sweet Dreams</div>
    <button class="mobile-nav-toggle" aria-controls="primary-navigation" aria-expanded="false"><span class="sr-only">Navigation</span><i class="fa-solid fa-bars"></i></button>
    <nav>
        <ul id ="primary-navigation" data-visible="false" class="primary-navigation flex">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="order.html" class="cta-nav">Order Now</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="menu-page">
        <h1>Our Desserts</h1>
        <p>Handcrafted daily with love and the finest ingredients.</p>

        <div class="filter">
            <span class="sr-only">Filter by type of conference</span>
            <button class='filter-btn active' data-filter="all">All</button>
            <button class='filter-btn' data-filter="cakes">Cakes</button>
            <button class='filter-btn' data-filter="cookies">Cookies</button>
            <button class='filter-btn' data-filter="pastries">Pastries</button>
        </div>

        <div class="menu-grid" id="menuGrid">
            <!-- Dynamic dessert cards will be injected here by JavaScript -->
        </div>
    </section>

    <a href="#" class="back-to-top"><i class="fa-solid fa-chevron-up"></i></a>

</main>

<footer>
    <p>© 2026 Sweet Dreams Bakery</p>
</footer>

</body>
</html>
